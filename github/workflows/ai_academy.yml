name: AI_Zero_to_Hero_Academy
on:
  workflow_dispatch:
  schedule:
    - cron: "45 * * * *" # Checks every hour at minute 45 (Random-looking timing)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Architect AI Curriculum"
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python3 -c "
          import requests, os, subprocess, re, random

          def run():
              # 🎲 THE HUMAN DICE ROLL
              # 0.3 means there is a 30% chance it codes this hour. 
              # This results in roughly 2-4 modules per day at random times.
              if random.random() > 0.3:
                  print('Human is taking a break. No commit this hour.')
                  return

              user = 'Ganesha369'
              
              curriculum = [
                  '01-Basics-What-is-an-LLM-and-Tokens',
                  '02-Basics-Prompting-and-Temperature',
                  '03-Milestone-Interactive-Prompt-Playground',
                  '04-API-Connecting-Python-to-Gemini',
                  '05-API-Structuring-JSON-Responses',
                  '06-Milestone-Custom-AI-Chatbot',
                  '07-Memory-What-are-Embeddings-and-Vectors',
                  '08-Memory-Building-a-Simple-Vector-Search',
                  '09-Milestone-Chat-With-Your-Data-RAG'
              ]

              next_topic = next((t for t in curriculum if not os.path.exists(t)), None)
              if not next_topic: return

              prompt = f'''Act as a Staff AI Engineer at Google teaching an absolute beginner.
              Topic: {next_topic}. Explain every tiny detail. Use the Level 0-4 framework.
              Include code snippets for every level.
              [TITLE]Topic Name[/TITLE]
              [DESC]One simple sentence explaining this concept.[/DESC]
              [LESSON]Detailed guide with levels 0-4.[/LESSON]
              [CODE]Fully commented Streamlit Python script.[/CODE]'''

              url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key={os.getenv(\"API_KEY\")}'
              resp = requests.post(url, json={'contents': [{'parts':[{'text': prompt}]}]})
              text = resp.json()['candidates'][0]['content']['parts'][0]['text']

              def get_tag(tag):
                  match = re.search(f'\\[{tag}\\](.*?)\\[/{tag}\\]', text, re.DOTALL)
                  return match.group(1).strip() if match else 'Detail coming...'

              title, desc, lesson, code = get_tag('TITLE'), get_tag('DESC'), get_tag('LESSON'), get_tag('CODE')
              os.makedirs(next_topic, exist_ok=True)
              
              live_link = f'https://ganesha-ai-lab.streamlit.app/?path={next_topic}/main.py'
              
              with open(f'{next_topic}/main.py', 'w') as f: f.write(code)
              with open(f'{next_topic}/LEARN.md', 'w') as f: 
                  f.write(f'# {title}\n\n{desc}\n\n[🚀 RUN LIVE]({live_link})\n\n---\n\n{lesson}')

              # 📚 Neat README Builder
              toc = '# 🤖 AI From Scratch Academy\n\n## 📚 Course Syllabus\n\n'
              for topic in curriculum:
                  if os.path.exists(topic):
                      topic_desc = 'Explore the lesson.'
                      try:
                          with open(f'{topic}/LEARN.md', 'r') as f:
                              lines = f.readlines()
                              if len(lines) > 2: topic_desc = lines[2].strip().replace(\"**\", \"\")
                      except: pass
                      toc += f'- [{topic.replace(\"-\", \" \")}]({topic}/LEARN.md)\n  *{topic_desc}*\n\n<br>\n\n'

              with open('README.md', 'w') as f: f.write(toc)

              # 🕵️ HUMAN-LIKE GIT COMMANDS
              subprocess.run(['git', 'config', 'user.name', user])
              subprocess.run(['git', 'config', 'user.email', 'ganesha.am.369@gmail.com'])
              subprocess.run(['git', 'add', '.'])
              # Random commit messages to look human
              msgs = [f'Update: {next_topic}', f'Added {title} notes', f'Learning {next_topic}', f'Module {next_topic} complete']
              subprocess.run(['git', 'commit', '-m', random.choice(msgs)])
              subprocess.run(['git', 'push'])
          run()
          "
