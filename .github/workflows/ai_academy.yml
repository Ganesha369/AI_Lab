name: AI_Zero_to_Hero_Academy
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4,9,15,20 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4
      - name: "Accelerated AI Content Generation"
        env:
          # Using your exact secret names from 1000246517.jpg
          API_KEY: ${{ secrets.GEMINI_API_KEY2 }}
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python3 -c "
          import requests, os, subprocess, re, random, time

          def run():
              user = 'Ganesha369'
              curriculum = ['01-Basics-What-is-an-LLM-and-Tokens', '02-Basics-Prompting-and-Temperature', '03-Milestone-Interactive-Prompt-Playground', '04-API-Connecting-Python-to-Gemini', '05-API-Structuring-JSON-Responses', '06-Milestone-Custom-AI-Chatbot', '07-Memory-What-are-Embeddings-and-Vectors', '08-Memory-Building-a-Simple-Vector-Search', '09-Milestone-Chat-With-Your-Data-RAG', '10-Agents-Function-Calling-Basics', '11-Agents-Building-a-Web-Search-Tool', '12-Agents-Multi-Agent-Collaboration']
              
              next_topic = next((t for t in curriculum if not os.path.exists(t)), None)
              if not next_topic: return

              # STRATEGY: 2-3 concepts daily. Force the very first one to show it works.
              if next_topic != '01-Basics-What-is-an-LLM-and-Tokens' and random.random() > 0.70:
                  print('Human behavior: taking a break.'); return

              prompt = f'Act as a Google Staff AI Engineer. Topic: {next_topic}. Detailed Lesson Level 0-4. [TITLE]..[/TITLE][DESC]..[/DESC][LESSON]..[/LESSON][CODE]..[/CODE]'
              url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key={os.getenv(\"API_KEY\")}'
              
              for _ in range(3):
                  try:
                      r = requests.post(url, json={'contents': [{'parts':[{'text': prompt}]}]})
                      text = r.json()['candidates'][0]['content']['parts'][0]['text']
                      break
                  except Exception as e:
                      print(f'API Error: {e}'); time.sleep(10)
              else: return

              def get_tag(tag):
                  m = re.search(fr'\[{tag}\](.*?)\[/{tag}\]', text, re.DOTALL)
                  return m.group(1).strip() if m else 'Pending...'

              title, desc, lesson, code = get_tag('TITLE'), get_tag('DESC'), get_tag('LESSON'), get_tag('CODE')
              os.makedirs(next_topic, exist_ok=True)
              link = f'https://ganesha-ai-lab.streamlit.app/?path={next_topic}/main.py'

              open(f'{next_topic}/main.py', 'w').write(code)
              open(f'{next_topic}/LEARN.md', 'w').write(f'# {title}\n\n{desc}\n\n[🚀 RUN LIVE ON STREAMLIT]({link})\n\n---\n\n{lesson}')

              toc = '# 🤖 AI From Scratch Academy\n\n## 📚 Syllabus\n\n'
              for topic in curriculum:
                  if os.path.exists(topic):
                      try: 
                          lns = open(f'{topic}/LEARN.md').readlines()
                          d = lns[2].strip().replace(\"**\", \"\") if len(lns)>2 else 'Explore.'
                      except: d = 'Module complete.'
                      toc += f'- [{topic.replace(\"-\", \" \")}]({topic}/LEARN.md)\n  *{d}*\n\n<br>\n\n'

              open('README.md', 'w').write(toc)
              
              # GITHUB PUSH WITH YOUR TOKEN
              subprocess.run(['git', 'config', 'user.name', user])
              subprocess.run(['git', 'config', 'user.email', 'ganesha.am.369@gmail.com'])
              subprocess.run(['git', 'add', '.'])
              subprocess.run(['git', 'commit', '-m', f'Module: {title}'])
              subprocess.run(['git', 'remote', 'set-url', 'origin', f'https://x-access-token:{os.getenv(\"GH_TOKEN\")}@github.com/{user}/AI_Lab.git'])
              subprocess.run(['git', 'push'])
          run()
          "
