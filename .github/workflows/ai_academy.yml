name: AI_Zero_to_Hero_Academy
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4,9,15,20 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4
      - name: "Accelerated AI Content Generation"
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python3 -c "
          import requests, os, subprocess, re, random, time

          def run():
              user = 'Ganesha369'
              curriculum = [
                  '01-Basics-What-is-an-LLM-and-Tokens',
                  '02-Basics-Prompting-and-Temperature',
                  '03-Milestone-Interactive-Prompt-Playground',
                  '04-API-Connecting-Python-to-Gemini',
                  '05-API-Structuring-JSON-Responses',
                  '06-Milestone-Custom-AI-Chatbot',
                  '07-Memory-What-are-Embeddings-and-Vectors',
                  '08-Memory-Building-a-Simple-Vector-Search',
                  '09-Milestone-Chat-With-Your-Data-RAG',
                  '10-Agents-Function-Calling-Basics',
                  '11-Agents-Building-a-Web-Search-Tool',
                  '12-Agents-Multi-Agent-Collaboration'
              ]

              # FIND NEXT TOPIC
              next_topic = next((t for t in curriculum if not os.path.exists(t)), None)
              if not next_topic: return

              # --- HUMAN BEHAVIOR OVERRIDE ---
              # If we haven't even started (Topic 01), we FORCE it to run.
              # For later topics, it has a 70% chance to run (2-3 per day).
              if next_topic != '01-Basics-What-is-an-LLM-and-Tokens':
                  if random.random() > 0.70:
                      print('Human behavior: skipping this session.')
                      return

              prompt = f'Act as a Google Staff AI Engineer. Topic: {next_topic}. Detailed Lesson Level 0-4. [TITLE]..[/TITLE][DESC]..[/DESC][LESSON]..[/LESSON][CODE]..[/CODE]'
              url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key={os.getenv(\"API_KEY\")}'
              
              for attempt in range(3):
                  try:
                      resp = requests.post(url, json={'contents': [{'parts':[{'text': prompt}]}]})
                      data = resp.json()
                      # Safety check for API response
                      if 'candidates' not in data:
                          print(f'API Warning: {data}')
                          time.sleep(5)
                          continue
                      text = data['candidates'][0]['content']['parts'][0]['text']
                      break
                  except:
                      time.sleep(5)
              else: return

              def get_tag(tag):
                  m = re.search(fr'\[{tag}\](.*?)\[/{tag}\]', text, re.DOTALL)
                  return m.group(1).strip() if m else 'Pending...'

              title, desc, lesson, code = get_tag('TITLE'), get_tag('DESC'), get_tag('LESSON'), get_tag('CODE')
              os.makedirs(next_topic, exist_ok=True)
              link = f'https://ganesha-ai-lab.streamlit.app/?path={next_topic}/main.py'

              with open(f'{next_topic}/main.py', 'w') as f: f.write(code)
              with open(f'{next_topic}/LEARN.md', 'w') as f: 
                  f.write(f'# {title}\n\n{desc}\n\n[🚀 RUN LIVE ON STREAMLIT]({link})\n\n---\n\n{lesson}')

              # UPDATE README
              toc = '# 🤖 AI From Scratch Academy\n\n## 📚 Syllabus\n\n'
              for topic in curriculum:
                  if os.path.exists(topic):
                      d = 'Explore module.'
                      try:
                          with open(f'{topic}/LEARN.md', 'r') as f:
                          lns = f.readlines()
                              if len(lns) > 2: d = lns[2].strip().replace(\"**\", \"\")
                      except: pass
                      toc += f'- [{topic.replace(\"-\", \" \")}]({topic}/LEARN.md)\n  *{d}*\n\n<br>\n\n'

              with open('README.md', 'w') as f: f.write(toc)

              subprocess.run(['git', 'config', 'user.name', user])
              subprocess.run(['git', 'config', 'user.email', 'ganesha.am.369@gmail.com'])
              subprocess.run(['git', 'add', '.'])
              subprocess.run(['git', 'commit', '-m', f'Module: {title}'])
              subprocess.run(['git', 'push'])
          run()
          "
