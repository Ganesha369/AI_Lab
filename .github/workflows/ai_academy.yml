name: AI_Zero_to_Hero_Academy
on:
  workflow_dispatch:
  schedule:
    - cron: "45 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4
      - name: "Google-Level AI Content Generation"
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python3 -c "
          import requests, os, subprocess, re, random

          def run():
              # Dice roll for human-like behavior
              if random.random() > 0.4:
                  print('Human is taking a break.')
                  return

              user = 'Ganesha369'
              curriculum = ['01-Basics-What-is-an-LLM-and-Tokens', '02-Basics-Prompting-and-Temperature', '03-Milestone-Interactive-Prompt-Playground', '04-API-Connecting-Python-to-Gemini', '05-API-Structuring-JSON-Responses', '06-Milestone-Custom-AI-Chatbot', '07-Memory-What-are-Embeddings-and-Vectors', '08-Memory-Building-a-Simple-Vector-Search', '09-Milestone-Chat-With-Your-Data-RAG', '10-Agents-Function-Calling-Basics', '11-Agents-Building-a-Web-Search-Tool', '12-Milestone-Autonomous-Research-Agent']

              next_topic = next((t for t in curriculum if not os.path.exists(t)), None)
              if not next_topic: return

              prompt = f'Act as a Staff AI Engineer at Google. Teach {next_topic} to a beginner. Use Level 0-4 (Analogy to Industry). Format EXACTLY with [TITLE], [DESC], [LESSON], and [CODE] tags.'
              url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key={os.getenv(\"API_KEY\")}'
              
              resp = requests.post(url, json={'contents': [{'parts':[{'text': prompt}]}]})
              text = resp.json()['candidates'][0]['content']['parts'][0]['text']

              def get_tag(tag):
                  m = re.search(fr'\[{tag}\](.*?)\[/{tag}\]', text, re.DOTALL)
                  return m.group(1).strip() if m else 'Content pending...'

              title, desc, lesson, code = get_tag('TITLE'), get_tag('DESC'), get_tag('LESSON'), get_tag('CODE')
              os.makedirs(next_topic, exist_ok=True)
              link = f'https://ganesha-ai-lab.streamlit.app/?path={next_topic}/main.py'

              with open(f'{next_topic}/main.py', 'w') as f: f.write(code)
              with open(f'{next_topic}/LEARN.md', 'w') as f: f.write(f'# {title}\n\n{desc}\n\n[🚀 RUN LIVE ON STREAMLIT]({link})\n\n---\n\n{lesson}')

              toc = '# 🤖 AI From Scratch Academy\n\n## 📚 Syllabus\n\n'
              for topic in curriculum:
                  if os.path.exists(topic):
                      d = 'Lesson available.'
                      try:
                          with open(f'{topic}/LEARN.md', 'r') as f:
                              lns = f.readlines()
                              if len(lns) > 2: d = lns[2].strip().replace(\"**\", \"\")
                      except: pass
                      toc += f'- [{topic.replace(\"-\", \" \")}]({topic}/LEARN.md)\n  *{d}*\n\n<br>\n\n'

              with open('README.md', 'w') as f: f.write(toc)

              subprocess.run(['git', 'config', 'user.name', user])
              subprocess.run(['git', 'config', 'user.email', 'ganesha.am.369@gmail.com'])
              subprocess.run(['git', 'add', '.'])
              msg = random.choice([f'Update: {title}', f'Added {next_topic}', f'Module {title} finished'])
              subprocess.run(['git', 'commit', '-m', msg])
              subprocess.run(['git', 'push'])
          run()
          "
